<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    All Projects
  </title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial,sans-serif;

      background:
      linear-gradient(
        135deg,
        #070816,
        #111827,
        #1e1b4b
      );

      color:white;

      min-height:100vh;

      padding:30px;

      overflow-x:hidden;

      position:relative;
    }

    /* BACKGROUND */

    .bg-animation{

      position:fixed;

      width:100%;

      height:100%;

      top:0;

      left:0;

      overflow:hidden;

      z-index:-1;
    }

    .blob{

      position:absolute;

      border-radius:50%;

      filter:blur(120px);

      opacity:0.3;

      animation:float 12s infinite ease-in-out;
    }

    .blob1{

      width:350px;

      height:350px;

      background:#7c3aed;

      top:10%;

      left:5%;
    }

    .blob2{

      width:300px;

      height:300px;

      background:#06b6d4;

      bottom:10%;

      right:10%;
    }

    .blob3{

      width:250px;

      height:250px;

      background:#ec4899;

      top:40%;

      right:30%;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-30px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    /* NAVBAR */

    .navbar{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:40px;
    }

    .logo{

      font-size:40px;

      font-weight:bold;

      color:#a855f7;

      text-shadow:
      0 0 10px #9333ea,
      0 0 25px #9333ea;
    }

    .nav-links{

      display:flex;

      gap:15px;
    }

    .nav-links a{

      text-decoration:none;

      color:white;

      padding:12px 20px;

      border-radius:14px;

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);
    }

    h1{

      font-size:50px;

      margin-bottom:35px;

      color:#c084fc;
    }

    /* PROJECT GRID */

    .project-grid{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(360px,1fr));

      gap:24px;
    }

    .project-card{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(14px);

      border-radius:24px;

      padding:24px;

      box-shadow:
      0 8px 30px rgba(0,0,0,0.3);
    }

    .project-card h2{

      margin-bottom:14px;
    }

    .artist{

      color:#d1d5db;

      margin-bottom:18px;

      line-height:1.8;
    }

    .section-title{

      margin-top:18px;

      margin-bottom:10px;

      font-size:18px;

      font-weight:bold;
    }

    .expense-title{

      color:#f472b6;
    }

    .revenue-title{

      color:#22c55e;
    }

    .mini-table{

      width:100%;

      border-collapse:collapse;

      margin-bottom:15px;
    }

    .mini-table th{

      text-align:left;

      padding:10px;

      color:#c084fc;
    }

    .mini-table td{

      padding:10px;

      border-top:
      1px solid rgba(255,255,255,0.08);
    }

    .stats{

      margin-top:20px;

      line-height:2;
    }

    .profit{

      color:#22c55e;

      font-weight:bold;
    }

    .loss{

      color:#ef4444;

      font-weight:bold;
    }

    /* BUTTONS */

    .button-row{

      display:flex;

      gap:15px;

      margin-top:22px;
    }

    button{

      flex:1;

      padding:14px;

      border:none;

      border-radius:14px;

      color:white;

      font-weight:bold;

      cursor:pointer;
    }

    .edit-btn{

      background:
      linear-gradient(
        to right,
        #3b82f6,
        #06b6d4
      );
    }

    .delete-btn{

      background:
      linear-gradient(
        to right,
        #ef4444,
        #f97316
      );
    }

    /* FOOTER */

    .footer{

      text-align:center;

      margin-top:45px;

      color:#d1d5db;
    }

    /* MOBILE */

    @media(max-width:768px){

      body{
        padding:18px;
      }

      .navbar{

        flex-direction:column;

        align-items:flex-start;

        gap:20px;
      }

      .nav-links{

        flex-wrap:wrap;
      }

      h1{

        font-size:36px;
      }

      .project-grid{

        grid-template-columns:1fr;
      }

      .button-row{

        flex-direction:column;
      }
    }

  </style>

</head>

<body>

  <!-- BACKGROUND -->

  <div class="bg-animation">

    <div class="blob blob1"></div>

    <div class="blob blob2"></div>

    <div class="blob blob3"></div>

  </div>

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      ATTICULTURE
    </div>

    <div class="nav-links">

      <a href="index.html">
        Dashboard
      </a>

      <a href="artists.html">
        Artists
      </a>

      <a href="budget.html">
        Budget
      </a>

    
      <a href="events.html">
        Events
      </a>

    </div>

  </div>

  <!-- TITLE -->

  <h1>
    All Projects
  </h1>

  <!-- PROJECT GRID -->

  <div
    class="project-grid"
    id="projectGrid"
  ></div>

  <!-- FOOTER -->

  <div class="footer">

    Made with ❤️ by Sritosh for Atticulture

  </div>

  <script>

    const artists =
      JSON.parse(
        localStorage.getItem("artists")
      ) || [];

    let projects =
      JSON.parse(
        localStorage.getItem("projects")
      ) || [];

    function saveProjects(){

      localStorage.setItem(
        "projects",
        JSON.stringify(projects)
      );
    }

    function deleteProject(index){

      const confirmDelete =
        confirm(
          "Delete this project?"
        );

      if(confirmDelete){

        projects.splice(index,1);

        saveProjects();

        renderProjects();
      }
    }

    function editProject(index){

      const project =
        projects[index];

      const newName =
        prompt(
          "Edit Project Name",
          project.name
        );

      if(newName){

        project.name =
          newName;

        saveProjects();

        renderProjects();
      }
    }

    function renderProjects(){

      const grid =
        document.getElementById(
          "projectGrid"
        );

      grid.innerHTML = "";

      if(projects.length === 0){

        grid.innerHTML = `

          <p>
            No projects added yet.
          </p>

        `;

        return;
      }

      projects
      .slice()
      .reverse()
      .forEach((project,index)=>{

        const realIndex =
          projects.length - 1 - index;

        /* SAFETY */

        if(!project.expenses){

          project.expenses = [];
        }

        if(!project.revenues){

          project.revenues = [];
        }

        /* CALCULATIONS */

        const totalSpent =
          project.expenses.reduce(
            (sum,item)=>
            sum + Number(item.amount),
            0
          );

        const totalRevenue =
          project.revenues.reduce(
            (sum,item)=>
            sum + Number(item.amount),
            0
          );

        const profit =
          totalRevenue - totalSpent;

        /* COLOR */

        const artistData =
          artists.find(
            a =>
            a.name ===
            project.artists?.[0]
          );

        const color =
          artistData
          ? artistData.color
          : "#a855f7";

        /* EXPENSE TABLE */

        const expenseRows =
          project.expenses
          .map(exp=>`

            <tr>

              <td>
                ${exp.reason}
              </td>

              <td>
                ₹${exp.amount}
              </td>

            </tr>

          `)
          .join("");

        /* REVENUE TABLE */

        const revenueRows =
          project.revenues
          .map(rev=>`

            <tr>

              <td>
                ${rev.reason}
              </td>

              <td>
                ₹${rev.amount}
              </td>

            </tr>

          `)
          .join("");

        /* CARD */

        const card =
          document.createElement("div");

        card.className =
          "project-card";

        card.style.border =
          `1px solid ${color}`;

        card.innerHTML = `

          <h2 style="color:${color}">
            ${project.name}
          </h2>

          <div class="artist">

            <strong>
              Artists:
            </strong>

            <br>

            ${
              project.artists
              ? project.artists.join(", ")
              : "No Artists"
            }

          </div>

          <div
            class="
              section-title
              expense-title
            "
          >
            Expense History
          </div>

          <table class="mini-table">

            <thead>

              <tr>

                <th>
                  Reason
                </th>

                <th>
                  Amount
                </th>

              </tr>

            </thead>

            <tbody>

              ${
                expenseRows ||

                `
                <tr>
                  <td colspan="2">
                    No Expenses Yet
                  </td>
                </tr>
                `
              }

            </tbody>

          </table>

          <div
            class="
              section-title
              revenue-title
            "
          >
            Revenue History
          </div>

          <table class="mini-table">

            <thead>

              <tr>

                <th>
                  Reason
                </th>

                <th>
                  Amount
                </th>

              </tr>

            </thead>

            <tbody>

              ${
                revenueRows ||

                `
                <tr>
                  <td colspan="2">
                    No Revenue Yet
                  </td>
                </tr>
                `
              }

            </tbody>

          </table>

          <div class="stats">

            <p>
              Budget:
              ₹${project.budget || 0}
            </p>

            <p>
              Total Spent:
              ₹${totalSpent}
            </p>

            <p>
              Total Revenue:
              ₹${totalRevenue}
            </p>

            <p class="${
              profit >= 0
              ? 'profit'
              : 'loss'
            }">

              ${
                profit >= 0
                ? 'Profit'
                : 'Loss'
              }

              :
              ₹${profit}

            </p>

          </div>

          <div class="button-row">

            <button
              class="edit-btn"
              onclick="
                editProject(${realIndex})
              "
            >
              Edit
            </button>

            <button
              class="delete-btn"
              onclick="
                deleteProject(${realIndex})
              "
            >
              Delete
            </button>

          </div>

        `;

        grid.appendChild(card);

      });

    }

    renderProjects();

  </script>

</body>

</html>
