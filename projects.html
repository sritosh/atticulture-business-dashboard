<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>All Projects</title>

  <style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:Arial,sans-serif;

  background:
  linear-gradient(
    135deg,
    #09090f,
    #111827,
    #1e1b4b
  );

  min-height:100vh;

  padding:30px;

  color:white;

  overflow-x:hidden;

  position:relative;
}

/* ANIMATED BACKGROUND */

.bg-animation{

  position:fixed;

  width:100%;

  height:100%;

  top:0;

  left:0;

  overflow:hidden;

  z-index:-1;
}

.blob{

  position:absolute;

  border-radius:50%;

  filter:blur(120px);

  opacity:0.35;

  animation:float 12s infinite ease-in-out;
}

.blob1{

  width:350px;

  height:350px;

  background:#7c3aed;

  top:10%;

  left:5%;
}

.blob2{

  width:300px;

  height:300px;

  background:#06b6d4;

  bottom:10%;

  right:10%;

  animation-delay:2s;
}

.blob3{

  width:250px;

  height:250px;

  background:#ec4899;

  top:40%;

  right:30%;

  animation-delay:4s;
}

@keyframes float{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-30px);
  }

  100%{
    transform:translateY(0px);
  }
}

/* NAVBAR */

.navbar{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:35px;
}

.logo{

  font-size:38px;

  font-weight:bold;

  color:#a855f7;

  text-shadow:
  0 0 10px #9333ea,
  0 0 25px #9333ea;
}

.nav-links{

  display:flex;

  gap:15px;
}

.nav-links a{

  text-decoration:none;

  padding:12px 20px;

  border-radius:14px;

  color:white;

  font-weight:bold;

  background:
  rgba(255,255,255,0.08);

  border:
  1px solid rgba(255,255,255,0.1);

  backdrop-filter:blur(12px);

  transition:0.3s;
}

.nav-links a:hover{

  background:
  rgba(168,85,247,0.25);

  box-shadow:
  0 0 20px rgba(168,85,247,0.5);
}

/* TOP CARDS */

.top-cards{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

  margin-bottom:30px;
}

.card{

  background:
  rgba(255,255,255,0.08);

  border:
  1px solid rgba(255,255,255,0.1);

  backdrop-filter:blur(14px);

  padding:25px;

  border-radius:24px;

  box-shadow:
  0 8px 30px rgba(0,0,0,0.3);
}

.card p{

  color:#cbd5e1;

  margin-bottom:10px;
}

.card h2{

  font-size:34px;

  color:#fff;
}

/* BOXES */

.add-box,
.chart-section,
.chart-box,
.budget-box,
.project-card,
table{

  background:
  rgba(255,255,255,0.08);

  border:
  1px solid rgba(255,255,255,0.1);

  backdrop-filter:blur(14px);

  border-radius:24px;

  box-shadow:
  0 8px 30px rgba(0,0,0,0.3);
}

/* FORM SECTIONS */

.add-box,
.budget-box{

  padding:25px;

  margin-bottom:30px;
}

.add-box h2,
.budget-box h2,
.title{

  color:#c084fc;

  margin-bottom:20px;
}

/* INPUTS */

input{

  width:100%;

  padding:15px;

  border:none;

  border-radius:14px;

  margin-top:12px;

  background:
  rgba(255,255,255,0.08);

  color:white;

  outline:none;

  font-size:15px;

  border:
  1px solid rgba(255,255,255,0.08);
}

input::placeholder{

  color:#cbd5e1;
}

/* BUTTONS */

button{

  width:100%;

  padding:14px;

  margin-top:15px;

  border:none;

  border-radius:14px;

  background:
  linear-gradient(
    to right,
    #7c3aed,
    #06b6d4
  );

  color:white;

  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

button:hover{

  transform:translateY(-2px);

  box-shadow:
  0 0 20px rgba(124,58,237,0.6);
}

/* PROJECT GRID */

.project-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:20px;

  margin-top:30px;
}

.project-card{

  padding:24px;
}

.project-card h2{

  color:#c084fc;

  margin-bottom:10px;
}

.artist{

  color:#cbd5e1;

  margin-bottom:15px;
}

.stats{

  line-height:1.9;

  margin-bottom:15px;
}

.profit{

  color:#22c55e;

  font-weight:bold;
}

/* CHARTS */

.chart-section,
.chart-box{

  margin-top:35px;

  padding:25px;

  display:flex;

  justify-content:center;

  align-items:center;

  flex-direction:column;
}

.chart-container{

  width:280px;

  height:280px;
}

/* TABLE */

table{

  width:100%;

  margin-top:30px;

  border-collapse:collapse;

  overflow:hidden;
}

th{

  background:
  rgba(124,58,237,0.4);

  color:white;

  padding:16px;
}

td{

  padding:16px;

  text-align:center;

  border-bottom:
  1px solid rgba(255,255,255,0.08);
}

/* ACTION BUTTONS */

.edit-btn{

  background:#06b6d4;
}

.delete-btn{

  background:#ef4444;
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

  body{
    padding:18px;
  }

  .navbar{

    flex-direction:column;

    gap:18px;

    align-items:flex-start;
  }

  .logo{
    font-size:28px;
  }

  .nav-links{

    width:100%;

    display:flex;

    flex-wrap:wrap;

    gap:10px;
  }

  .nav-links a{

    flex:1;

    text-align:center;

    font-size:14px;

    padding:10px;
  }

  .top-cards{

    grid-template-columns:1fr;
  }

  .card h2{
    font-size:26px;
  }

  .project-grid{

    grid-template-columns:1fr;
  }

  .project-card{
    padding:18px;
  }

  .chart-container{

    width:220px;

    height:220px;
  }

  table{

    display:block;

    overflow-x:auto;

    white-space:nowrap;
  }

  input{
    font-size:14px;
  }

  button{
    font-size:14px;
  }

}
.footer{

  margin-top:40px;

  text-align:center;

  color:#cbd5e1;
                  
  font-size:14px;

  opacity:0.8;
}

</style>

</head>

<body>

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      ATTICULTURE
    </div>

    <div class="nav-links">

      <a href="index.html">
        Dashboard
      </a>

      <a href="budget.html">
        Monthly Budget
      </a>

    </div>

  </div>

  <h1 class="title">
    All Projects
  </h1>

  <div
    class="project-grid"
    id="projectGrid"
  ></div>

  <script>

    let projects =
      JSON.parse(
        localStorage.getItem("projects")
      ) || [];

    function saveProjects(){

      localStorage.setItem(
        "projects",
        JSON.stringify(projects)
      );
    }

    function deleteProject(index){

      const confirmDelete =
        confirm(
          "Delete this project?"
        );

      if(confirmDelete){

        projects.splice(index,1);

        saveProjects();

        renderProjects();
      }
    }

    function editProject(index){

      const updatedName =
        prompt(
          "Edit Project Name",
          projects[index].name
        );

      const updatedArtist =
        prompt(
          "Edit Artists",
          projects[index].artist
        );

      const updatedBudget =
        prompt(
          "Edit Budget",
          projects[index].budget
        );

      if(
        updatedName &&
        updatedArtist &&
        updatedBudget
      ){

        projects[index].name =
          updatedName;

        projects[index].artist =
          updatedArtist;

        projects[index].budget =
          Number(updatedBudget);

        saveProjects();

        renderProjects();
      }
    }

    function renderProjects(){

      const grid =
        document.getElementById("projectGrid");

      grid.innerHTML = "";

      if(projects.length === 0){

        grid.innerHTML = `

          <p class="empty">
            No Projects Added Yet
          </p>

        `;

        return;
      }

      projects.forEach((project,index)=>{

        const card =
          document.createElement("div");

        card.className =
          "project-card";

        card.innerHTML = `

          <h2>
            ${project.name}
          </h2>

          <p class="artist">

            Artists:
            ${project.artist}

          </p>

          <div class="stats">

            <p>
              Budget:
              ₹${project.budget}
            </p>

            <p>
              Spent:
              ₹${project.spent}
            </p>

            <p>
              Revenue:
              ₹${project.revenue}
            </p>

            <p class="profit">

              Profit:
              ₹${project.revenue - project.spent}

            </p>

          </div>

          <div class="btn-group">

            <button
              class="edit-btn"
              onclick="editProject(${index})"
            >
              Edit
            </button>

            <button
              class="delete-btn"
              onclick="deleteProject(${index})"
            >
              Delete
            </button>

          </div>

        `;

        grid.appendChild(card);

      });

    }

    renderProjects();

  </script>
  <div class="footer">

  Made with ❤️ by Sritosh for Atticulture

</div>

</body>

<div class="bg-animation">

  <div class="blob blob1"></div>

  <div class="blob blob2"></div>

  <div class="blob blob3"></div>

</div>

</html>
