<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Artists Analytics
  </title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial,sans-serif;

      background:
      linear-gradient(
        135deg,
        #070816,
        #111827,
        #1e1b4b
      );

      color:white;

      min-height:100vh;

      padding:30px;

      overflow-x:hidden;

      position:relative;
    }

    /* BACKGROUND */

    .bg-animation{

      position:fixed;

      width:100%;

      height:100%;

      top:0;

      left:0;

      z-index:-1;

      overflow:hidden;
    }

    .blob{

      position:absolute;

      border-radius:50%;

      filter:blur(120px);

      opacity:0.3;

      animation:float 12s infinite ease-in-out;
    }

    .blob1{

      width:350px;

      height:350px;

      background:#7c3aed;

      top:10%;

      left:5%;
    }

    .blob2{

      width:300px;

      height:300px;

      background:#06b6d4;

      bottom:10%;

      right:10%;
    }

    .blob3{

      width:250px;

      height:250px;

      background:#ec4899;

      top:40%;

      right:30%;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-30px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    /* NAVBAR */

    .navbar{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:40px;
    }

    .logo{

      font-size:40px;

      font-weight:bold;

      color:#a855f7;

      text-shadow:
      0 0 10px #9333ea,
      0 0 25px #9333ea;
    }

    .nav-links{

      display:flex;

      gap:15px;
    }

    .nav-links a{

      text-decoration:none;

      color:white;

      padding:12px 18px;

      border-radius:14px;

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);
    }

    h1{

      font-size:48px;

      margin-bottom:35px;

      color:#c084fc;
    }

    /* CHART SECTION */

    .chart-box{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(14px);

      border-radius:24px;

      padding:24px;

      margin-bottom:35px;

      box-shadow:
      0 8px 30px rgba(0,0,0,0.3);
    }

    .chart-container{

      width:100%;

      height:400px;
    }

    /* ADD ARTIST */

    .add-box{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(14px);

      border-radius:24px;

      padding:24px;

      margin-bottom:35px;
    }

    input{

      width:100%;

      padding:14px;

      margin-top:12px;

      border:none;

      border-radius:14px;

      background:
      rgba(255,255,255,0.08);

      color:white;

      outline:none;
    }

    button{

      width:100%;

      padding:14px;

      margin-top:14px;

      border:none;

      border-radius:14px;

      color:white;

      font-weight:bold;

      cursor:pointer;
    }

    .primary-btn{

      background:
      linear-gradient(
        to right,
        #7c3aed,
        #06b6d4
      );
    }

    .delete-btn{

      background:
      linear-gradient(
        to right,
        #ef4444,
        #f97316
      );
    }

    /* GRID */

    .artist-grid{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(350px,1fr));

      gap:24px;
    }

    .artist-card{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(14px);

      border-radius:24px;

      padding:24px;

      box-shadow:
      0 8px 30px rgba(0,0,0,0.3);
    }

    .artist-card h2{

      margin-bottom:18px;

      font-size:42px;
    }

    .stats{

      line-height:2;

      margin-top:15px;
    }

    .profit{

      color:#22c55e;

      font-weight:bold;
    }

    .loss{

      color:#ef4444;

      font-weight:bold;
    }

    .project-list{

      margin-top:18px;
    }

    .project-item{

      padding:12px;

      margin-top:10px;

      border-radius:12px;

      background:
      rgba(255,255,255,0.05);
    }

    .project-item strong{

      display:block;

      margin-bottom:5px;
    }

    /* FOOTER */

    .footer{

      text-align:center;

      margin-top:45px;

      color:#d1d5db;
    }

    /* MOBILE */

    @media(max-width:768px){

      body{
        padding:18px;
      }

      .navbar{

        flex-direction:column;

        align-items:flex-start;

        gap:20px;
      }

      .nav-links{

        flex-wrap:wrap;
      }

      h1{

        font-size:36px;
      }

      .artist-grid{

        grid-template-columns:1fr;
      }

      .chart-container{

        height:300px;
      }
    }

  </style>

</head>

<body>

  <!-- BACKGROUND -->

  <div class="bg-animation">

    <div class="blob blob1"></div>

    <div class="blob blob2"></div>

    <div class="blob blob3"></div>

  </div>

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      ATTICULTURE
    </div>

    <div class="nav-links">

      <a href="index.html">
        Dashboard
      </a>

      <a href="projects.html">
        Projects
      </a>

      <a href="budget.html">
        Budget
      </a>

    </div>

  </div>

  <!-- TITLE -->

  <h1>
    Artists Analytics
  </h1>

  <!-- GRAPH -->

  <div class="chart-box">

    <div class="chart-container">

      <canvas id="artistChart"></canvas>

    </div>

  </div>

  <!-- ADD ARTIST -->

  <div class="add-box">

    <input
      type="text"
      id="artistName"
      placeholder="Artist Name"
    >

    <input
      type="color"
      id="artistColor"
      value="#a855f7"
    >

    <button
      class="primary-btn"
      onclick="addArtist()"
    >
      Add Artist
    </button>

  </div>

  <!-- ARTIST GRID -->

  <div
    class="artist-grid"
    id="artistGrid"
  ></div>

  <!-- FOOTER -->

  <div class="footer">

    Made with ❤️ by Sritosh for Atticulture

  </div>

  <script>

    let artists =
      JSON.parse(
        localStorage.getItem("artists")
      ) || [];

    let projects =
      JSON.parse(
        localStorage.getItem("projects")
      ) || [];

    function saveArtists(){

      localStorage.setItem(
        "artists",
        JSON.stringify(artists)
      );
    }

    /* CHART */

    const ctx =
      document.getElementById(
        "artistChart"
      );

    const artistChart =
      new Chart(ctx,{

        type:"bar",

        data:{

          labels:[],

          datasets:[

            {

              label:"Revenue",

              data:[],

              backgroundColor:"#22c55e"

            },

            {

              label:"Expenses",

              data:[],

              backgroundColor:"#ef4444"

            }

          ]

        },

        options:{

          responsive:true,

          maintainAspectRatio:false

        }

      });

    /* ADD ARTIST */

    function addArtist(){

      const name =
        document.getElementById(
          "artistName"
        ).value;

      const color =
        document.getElementById(
          "artistColor"
        ).value;

      if(!name){

        alert(
          "Enter artist name"
        );

        return;
      }

      artists.push({

        name,
        color

      });

      saveArtists();

      renderArtists();

      document.getElementById(
        "artistName"
      ).value = "";
    }

    /* DELETE */

    function deleteArtist(index){

      const confirmDelete =
        confirm(
          "Delete this artist?"
        );

      if(confirmDelete){

        artists.splice(index,1);

        saveArtists();

        renderArtists();
      }
    }

    /* RENDER */

    function renderArtists(){

      const grid =
        document.getElementById(
          "artistGrid"
        );

      grid.innerHTML = "";

      let chartLabels = [];

      let chartRevenue = [];

      let chartExpenses = [];

      artists.forEach((artist,index)=>{

        const relatedProjects =
          projects.filter(project =>

            project.artists &&
            project.artists.includes(
              artist.name
            )

          );

        let totalRevenue = 0;

        let totalSpent = 0;

        relatedProjects.forEach(project=>{

          if(!project.expenses){

            project.expenses = [];
          }

          if(!project.revenues){

            project.revenues = [];
          }

          const spent =
            project.expenses.reduce(
              (sum,item)=>

                sum +
                Number(item.amount || 0),

              0
            );

          const revenue =
            project.revenues.reduce(
              (sum,item)=>

                sum +
                Number(item.amount || 0),

              0
            );

          totalSpent += spent;

          totalRevenue += revenue;

        });

        const profit =
          totalRevenue - totalSpent;

        chartLabels.push(
          artist.name
        );

        chartRevenue.push(
          totalRevenue
        );

        chartExpenses.push(
          totalSpent
        );

        const projectList =
          relatedProjects.length > 0

          ?

          relatedProjects.map(project=>`

            <div class="project-item">

              <strong>
                ${project.name}
              </strong>

              Budget:
              ₹${project.budget || 0}

            </div>

          `).join("")

          :

          `<p>No Projects Yet</p>`;

        const card =
          document.createElement("div");

        card.className =
          "artist-card";

        card.style.border =
          `1px solid ${artist.color}`;

        card.innerHTML = `

          <h2 style="color:${artist.color}">
            ${artist.name}
          </h2>

          <div class="stats">

            <p>

              Total Projects:
              ${relatedProjects.length}

            </p>

            <p>

              Revenue:
              ₹${totalRevenue}

            </p>

            <p>

              Spent:
              ₹${totalSpent}

            </p>

            <p class="${
              profit >= 0
              ? 'profit'
              : 'loss'
            }">

              ${
                profit >= 0
                ? 'Profit'
                : 'Loss'
              }

              :
              ₹${profit}

            </p>

          </div>

          <div class="project-list">

            <strong>
              Projects:
            </strong>

            ${projectList}

          </div>

          <button
            class="delete-btn"
            onclick="
              deleteArtist(${index})
            "
          >
            Delete Artist
          </button>

        `;

        grid.appendChild(card);

      });

      /* UPDATE GRAPH */

      artistChart.data.labels =
        chartLabels;

      artistChart.data.datasets[0].data =
        chartRevenue;

      artistChart.data.datasets[1].data =
        chartExpenses;

      artistChart.update();
    }

    renderArtists();

  </script>

</body>

</html>
