<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Events & Dates
  </title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial,sans-serif;

      background:
      linear-gradient(
        135deg,
        #070816,
        #111827,
        #1e1b4b
      );

      color:white;

      min-height:100vh;

      padding:30px;

      overflow-x:hidden;

      position:relative;
    }

    /* BACKGROUND */

    .bg-animation{

      position:fixed;

      width:100%;

      height:100%;

      top:0;

      left:0;

      overflow:hidden;

      z-index:-1;
    }

    .blob{

      position:absolute;

      border-radius:50%;

      filter:blur(120px);

      opacity:0.35;

      animation:float 12s infinite ease-in-out;
    }

    .blob1{

      width:350px;

      height:350px;

      background:#7c3aed;

      top:10%;

      left:5%;
    }

    .blob2{

      width:300px;

      height:300px;

      background:#06b6d4;

      bottom:10%;

      right:10%;

      animation-delay:2s;
    }

    .blob3{

      width:250px;

      height:250px;

      background:#ec4899;

      top:40%;

      right:30%;

      animation-delay:4s;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-30px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    /* NAVBAR */

    .navbar{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:35px;
    }

    .logo{

      font-size:38px;

      font-weight:bold;

      color:#a855f7;

      text-shadow:
      0 0 10px #9333ea,
      0 0 25px #9333ea;
    }

    .nav-links{

      display:flex;

      gap:15px;

      flex-wrap:wrap;
    }

    .nav-links a{

      text-decoration:none;

      padding:12px 20px;

      border-radius:14px;

      color:white;

      font-weight:bold;

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(12px);
    }

    /* TITLE */
    h1{
      font-size:50px;
      margin-bottom:35px;
      color:#c084fc;
    }

    /* FORM */

    .form-box{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(14px);

      border-radius:24px;

      box-shadow:
      0 8px 30px rgba(0,0,0,0.3);

      padding:25px;

      margin-bottom:30px;
    }

    .form-box h2{

      margin-bottom:20px;

      color:#c084fc;
    }

    input, textarea{

      width:100%;

      padding:14px;

      margin-top:12px;

      border:none;

      border-radius:14px;

      background:
      rgba(255,255,255,0.08);

      color:white;

      outline:none;

      font-family: inherit;
    }
    
    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Style for date input icon */
    ::-webkit-calendar-picker-indicator {
        filter: invert(1);
    }

    button{

      padding:14px;

      border:none;

      border-radius:14px;

      color:white;

      font-weight:bold;

      cursor:pointer;
    }

    .save-btn{

      width:100%;

      margin-top:15px;

      background:
      linear-gradient(
        to right,
        #7c3aed,
        #06b6d4
      );
    }

    .edit-btn{

      background:
      linear-gradient(
        to right,
        #3b82f6,
        #06b6d4
      );
    }

    .delete-btn{

      background:
      linear-gradient(
        to right,
        #ef4444,
        #f97316
      );
    }

    /* EVENT GRID */

    .event-grid{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(320px,1fr));

      gap:24px;
    }

    .event-card{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(14px);

      border-radius:24px;

      padding:24px;

      box-shadow:
      0 8px 30px rgba(0,0,0,0.3);
      
      display: flex;
      flex-direction: column;
    }

    .event-card h2{

      margin-bottom:14px;
      color: #06b6d4;
    }
    
    .event-date {
      color: #f472b6;
      font-weight: bold;
      margin-bottom: 15px;
      font-size: 18px;
    }
    
    .event-desc {
      color: #d1d5db;
      line-height: 1.6;
      margin-bottom: 20px;
      flex-grow: 1;
    }

    .button-row{

      display:flex;

      gap:15px;

      margin-top:auto;
    }
    
    .button-row button {
      flex: 1;
    }


    /* FOOTER */

    .footer{

      text-align:center;

      margin-top:40px;

      color:#cbd5e1;

      font-size:14px;
    }

    /* MOBILE */

    @media(max-width:768px){

      body{
        padding:18px;
      }

      .navbar{

        flex-direction:column;

        gap:20px;

        align-items:flex-start;
      }
      
      h1 {
        font-size: 36px;
      }
      
      .event-grid {
        grid-template-columns: 1fr;
      }
    }

  </style>

</head>

<body>

  <!-- BACKGROUND -->

  <div class="bg-animation">

    <div class="blob blob1"></div>

    <div class="blob blob2"></div>

    <div class="blob blob3"></div>

  </div>

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      ATTICULTURE
    </div>

    <div class="nav-links">

      <a href="index.html">
        Dashboard
      </a>

      <a href="projects.html">
        Projects
      </a>

      <a href="artists.html">
        Artists
      </a>

      <a href="budget.html">
        Budget
      </a>

    </div>

  </div>
  
  <!-- TITLE -->

  <h1>
    Events & Dates
  </h1>

  <!-- FORM -->

  <div class="form-box">

    <h2>
      Add Upcoming Event
    </h2>

    <input
      type="text"
      id="eventName"
      placeholder="Event Title"
    >

    <input
      type="date"
      id="eventDate"
    >

    <textarea
      id="eventDesc"
      placeholder="Event Description / Notes"
    ></textarea>

    <button
      class="save-btn"
      onclick="saveEvent()"
    >
      Save Event
    </button>

  </div>

  <!-- EVENTS GRID -->

  <div class="event-grid" id="eventGrid"></div>

  <!-- FOOTER -->

  <div class="footer">

    Made with ❤️ by Sritosh for Atticulture

  </div>

  <script>

    let eventsList =
      JSON.parse(
        localStorage.getItem("events")
      ) || [];

    /* SAVE */

    function saveEvent(){

      const title =
        document.getElementById("eventName").value;

      const date =
        document.getElementById("eventDate").value;

      const desc =
        document.getElementById("eventDesc").value;

      if(
        !title ||
        !date
      ){

        alert("Please enter title and date");

        return;
      }

      eventsList.push({

        title,
        date,
        desc

      });
      
      // Sort events by date ascending
      eventsList.sort((a, b) => new Date(a.date) - new Date(b.date));

      localStorage.setItem(
        "events",
        JSON.stringify(eventsList)
      );

      renderEvents();

      document.getElementById("eventName").value = "";

      document.getElementById("eventDate").value = "";

      document.getElementById("eventDesc").value = "";
    }

    /* DELETE */

    function deleteEvent(index){

      const confirmDelete =
        confirm(
          "Delete this event?"
        );

      if(confirmDelete){

        eventsList.splice(index,1);

        localStorage.setItem(
          "events",
          JSON.stringify(eventsList)
        );

        renderEvents();
      }
    }
    
    function formatDate(dateString) {
      const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', options);
    }

    /* RENDER */

    function renderEvents(){

      const grid =
        document.getElementById(
          "eventGrid"
        );

      grid.innerHTML = "";
      
      if(eventsList.length === 0){
        grid.innerHTML = `
          <p style="color:#d1d5db;">No events added yet.</p>
        `;
        return;
      }

      eventsList.forEach((item,index)=>{

        const card =
          document.createElement("div");
          
        card.className = "event-card";

        card.innerHTML = `

          <h2>
            ${item.title}
          </h2>
          
          <div class="event-date">
            📅 ${formatDate(item.date)}
          </div>
          
          <div class="event-desc">
            ${item.desc ? item.desc.replace(/\n/g, '<br>') : 'No description provided.'}
          </div>

          <div class="button-row">
            <button
              class="delete-btn"
              onclick="deleteEvent(${index})"
            >
              Delete Event
            </button>
          </div>

        `;

        grid.appendChild(card);

      });

    }

    renderEvents();

  </script>

</body>

</html>
