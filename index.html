<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    ATTICULTURE Dashboard
  </title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial,sans-serif;

      background:
      linear-gradient(
        135deg,
        #070816,
        #111827,
        #1e1b4b
      );

      color:white;

      min-height:100vh;

      padding:30px;

      overflow-x:hidden;

      position:relative;
    }

    /* BACKGROUND */

    .bg-animation{

      position:fixed;

      width:100%;

      height:100%;

      top:0;

      left:0;

      z-index:-1;

      overflow:hidden;
    }

    .blob{

      position:absolute;

      border-radius:50%;

      filter:blur(120px);

      opacity:0.3;

      animation:float 12s infinite ease-in-out;
    }

    .blob1{

      width:350px;

      height:350px;

      background:#7c3aed;

      top:5%;

      left:5%;
    }

    .blob2{

      width:300px;

      height:300px;

      background:#06b6d4;

      bottom:10%;

      right:10%;
    }

    .blob3{

      width:250px;

      height:250px;

      background:#ec4899;

      top:40%;

      right:30%;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-30px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    /* NAVBAR */

    .navbar{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:35px;
    }

    .logo{

      font-size:40px;

      font-weight:bold;

      color:#a855f7;

      text-shadow:
      0 0 10px #9333ea,
      0 0 25px #9333ea;
    }

    .nav-links{

      display:flex;

      gap:15px;
    }

    .nav-links a{

      text-decoration:none;

      color:white;

      padding:12px 18px;

      border-radius:14px;

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);
    }

    /* CARDS */

    .top-cards{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(220px,1fr));

      gap:20px;

      margin-bottom:30px;
    }

    .card,
    .legend-box,
    .add-box,
    .project-card,
    .chart-section{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(14px);

      border-radius:24px;

      box-shadow:
      0 8px 30px rgba(0,0,0,0.3);
    }

    .card{

      padding:24px;
    }

    .card h2{

      margin-top:12px;
    }

    /* LEGEND */

    .legend-box{

      padding:24px;

      margin-bottom:30px;
    }

    .legend-box h2{

      color:#c084fc;

      margin-bottom:18px;
    }

    .legend-grid{

      display:flex;

      flex-wrap:wrap;

      gap:12px;
    }

    .legend-item{

      display:flex;

      align-items:center;

      gap:10px;

      padding:10px 14px;

      border-radius:14px;

      background:
      rgba(255,255,255,0.05);
    }

    .legend-color{

      width:18px;

      height:18px;

      border-radius:50%;
    }

    /* ADD BOX */

    .add-box{

      padding:24px;

      margin-bottom:30px;
    }

    .add-box h2{

      color:#c084fc;

      margin-bottom:20px;
    }

    input,
    select{

      width:100%;

      padding:14px;

      margin-top:12px;

      border:none;

      border-radius:14px;

      background:
      rgba(255,255,255,0.08);

      color:white;

      outline:none;
    }

    option{

      background:#111827;
    }

    button{

      width:100%;

      padding:14px;

      margin-top:14px;

      border:none;

      border-radius:14px;

      color:white;

      font-weight:bold;

      cursor:pointer;
    }

    .primary-btn{

      background:
      linear-gradient(
        to right,
        #7c3aed,
        #06b6d4
      );
    }

    .pink-btn{

      background:
      linear-gradient(
        to right,
        #ec4899,
        #f43f5e
      );
    }

    .remove-btn{

      background:
      linear-gradient(
        to right,
        #ef4444,
        #f97316
      );
    }

    /* PROJECTS */

    .project-grid{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(370px,1fr));

      gap:20px;
    }

    .project-card{

      padding:24px;
    }

    .artist{

      color:#d1d5db;

      margin:10px 0;
    }

    .stats{

      line-height:2;

      margin-top:15px;
    }

    .profit{

      color:#22c55e;

      font-weight:bold;
    }

    .loss{

      color:#ef4444;

      font-weight:bold;
    }

    /* TABLES */

    .mini-table{

      width:100%;

      margin-top:18px;

      border-collapse:collapse;
    }

    .mini-table th{

      text-align:left;

      padding:10px;

      color:#c084fc;
    }

    .mini-table td{

      padding:10px;

      border-top:
      1px solid rgba(255,255,255,0.08);
    }

    /* CHART */

    .chart-section{

      margin-top:35px;

      padding:24px;

      text-align:center;
    }

    .chart-container{

      width:280px;

      height:280px;

      margin:auto;
    }

    /* FOOTER */

    .footer{

      text-align:center;

      margin-top:40px;

      color:#cbd5e1;
    }

    /* MOBILE */

    @media(max-width:768px){

      body{
        padding:18px;
      }

      .navbar{

        flex-direction:column;

        align-items:flex-start;

        gap:18px;
      }

      .nav-links{

        flex-wrap:wrap;
      }

      .project-grid{

        grid-template-columns:1fr;
      }

      .chart-container{

        width:220px;

        height:220px;
      }
    }

  </style>

</head>

<body>

  <!-- BACKGROUND -->

  <div class="bg-animation">

    <div class="blob blob1"></div>

    <div class="blob blob2"></div>

    <div class="blob blob3"></div>

  </div>

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      ATTICULTURE
    </div>

    <div class="nav-links">

      <a href="projects.html">
        Projects
      </a>

      <a href="artists.html">
        Artists
      </a>

      <a href="budget.html">
        Budget
      </a>

    </div>

  </div>

  <!-- TOP CARDS -->

  <div class="top-cards">

    <div class="card">

      <p>Total Projects</p>

      <h2 id="totalProjects">
        0
      </h2>

    </div>

    <div class="card">

      <p>Total Revenue</p>

      <h2 id="totalRevenue">
        ₹0
      </h2>

    </div>

    <div class="card">

      <p>Total Expenses</p>

      <h2 id="totalSpent">
        ₹0
      </h2>

    </div>

    <div class="card">

      <p>Total Profit</p>

      <h2 id="totalProfit">
        ₹0
      </h2>

    </div>

  </div>

  <!-- LEGEND -->

  <div class="legend-box">

    <h2>
      Artist Color Legend
    </h2>

    <div
      class="legend-grid"
      id="legendGrid"
    ></div>

  </div>

  <!-- ADD PROJECT -->

  <div class="add-box">

    <h2>
      Add New Project
    </h2>

    <input
      type="text"
      id="projectName"
      placeholder="Project Name"
    >

    <div id="artistContainer">

      <select class="artist-select"></select>

      <select class="artist-select"></select>

    </div>

    <button
      class="pink-btn"
      onclick="addArtistField()"
    >
      + Add More Artist
    </button>

    <input
      type="number"
      id="projectBudget"
      placeholder="Project Budget"
    >

    <button
      class="primary-btn"
      onclick="addProject()"
    >
      Add Project
    </button>

  </div>

  <!-- PROJECTS -->

  <div
    class="project-grid"
    id="projectGrid"
  ></div>

  <!-- CHART -->

  <div class="chart-section">

    <h2>
      Analytics Overview
    </h2>

    <div class="chart-container">

      <canvas id="analyticsChart"></canvas>

    </div>

  </div>

  <!-- FOOTER -->

  <div class="footer">

    Made with ❤️ by Sritosh for Atticulture

  </div>

  <script>

    const defaultArtists = [

      {
        name:"Ofro",
        color:"#a855f7"
      },

      {
        name:"Kelithee",
        color:"#06b6d4"
      },

      {
        name:"Asal kolaar",
        color:"#ec4899"
      },

      {
        name:"Fault kai",
        color:"#22c55e"
      },

      {
        name:"Urban thozha",
        color:"#f97316"
      },

      {
        name:"Vaasi",
        color:"#eab308"
      },

      {
        name:"Rahul Sridhar",
        color:"#3b82f6"
      }

    ];

    if(!localStorage.getItem("artists")){

      localStorage.setItem(
        "artists",
        JSON.stringify(defaultArtists)
      );
    }

    const artists =
      JSON.parse(
        localStorage.getItem("artists")
      ) || [];

    let projects =
      JSON.parse(
        localStorage.getItem("projects")
      ) || [];

    /* LOAD ARTISTS */

    function loadArtists(){

      const selects =
        document.querySelectorAll(
          ".artist-select"
        );

      selects.forEach((select)=>{

        select.innerHTML = "";

        artists.forEach((artist)=>{

          const option =
            document.createElement("option");

          option.value =
            artist.name;

          option.innerText =
            artist.name;

          select.appendChild(option);

        });

      });

    }

    /* RENDER LEGEND */

    function renderLegend(){

      const legendGrid =
        document.getElementById(
          "legendGrid"
        );

      legendGrid.innerHTML = "";

      artists.forEach((artist)=>{

        const item =
          document.createElement("div");

        item.className =
          "legend-item";

        item.innerHTML = `

          <div
            class="legend-color"
            style="
              background:${artist.color};
            "
          ></div>

          <span>
            ${artist.name}
          </span>

        `;

        legendGrid.appendChild(item);

      });

    }

    /* ADD ARTIST FIELD */

    function addArtistField(){

      const container =
        document.getElementById(
          "artistContainer"
        );

      const wrapper =
        document.createElement("div");

      wrapper.style.marginTop =
        "12px";

      const select =
        document.createElement("select");

      select.className =
        "artist-select";

      artists.forEach((artist)=>{

        const option =
          document.createElement("option");

        option.value =
          artist.name;

        option.innerText =
          artist.name;

        select.appendChild(option);

      });

      const removeBtn =
        document.createElement("button");

      removeBtn.innerText =
        "Remove Artist";

      removeBtn.className =
        "remove-btn";

      removeBtn.onclick =
        function(){

          const total =
            document.querySelectorAll(
              ".artist-select"
            ).length;

          if(total <= 2){

            alert(
              "Minimum 2 artists required"
            );

            return;
          }

          wrapper.remove();
        };

      wrapper.appendChild(select);

      wrapper.appendChild(removeBtn);

      container.appendChild(wrapper);
    }

    /* SAVE */

    function saveProjects(){

      localStorage.setItem(
        "projects",
        JSON.stringify(projects)
      );
    }

    /* ADD PROJECT */

    function addProject(){

      const name =
        document.getElementById(
          "projectName"
        ).value;

      const budget =
        Number(
          document.getElementById(
            "projectBudget"
          ).value
        );

      const selects =
        document.querySelectorAll(
          ".artist-select"
        );

      let selectedArtists = [];

      selects.forEach((select)=>{

        selectedArtists.push(
          select.value
        );

      });

      if(
        !name ||
        !budget
      ){

        alert(
          "Fill all fields"
        );

        return;
      }

      projects.push({

        name,

        artists:selectedArtists,

        budget,

        expenses:[],

        revenues:[]

      });

      saveProjects();

      renderProjects();
    }

    /* ADD EXPENSE */

    function addExpense(index){

      const reason =
        document.getElementById(
          `expenseReason-${index}`
        ).value;

      const amount =
        Number(
          document.getElementById(
            `expenseAmount-${index}`
          ).value
        );

      if(
        !reason ||
        !amount
      ){

        alert(
          "Fill expense details"
        );

        return;
      }

      projects[index]
      .expenses
      .push({

        reason,
        amount

      });

      saveProjects();

      renderProjects();
    }

    /* ADD REVENUE */

    function addRevenue(index){

      const reason =
        document.getElementById(
          `revenueReason-${index}`
        ).value;

      const amount =
        Number(
          document.getElementById(
            `revenueAmount-${index}`
          ).value
        );

      if(
        !reason ||
        !amount
      ){

        alert(
          "Fill revenue details"
        );

        return;
      }

      projects[index]
      .revenues
      .push({

        reason,
        amount

      });

      saveProjects();

      renderProjects();
    }

    /* CHART */

    const ctx =
      document.getElementById(
        "analyticsChart"
      );

    const chart =
      new Chart(ctx,{

        type:"doughnut",

        data:{

          labels:[
            "Expenses",
            "Revenue"
          ],

          datasets:[{

            data:[0,0],

            backgroundColor:[
              "#ef4444",
              "#22c55e"
            ]

          }]
        }

      });

    /* RENDER */

    function renderProjects(){

      const grid =
        document.getElementById(
          "projectGrid"
        );

      grid.innerHTML = "";

      let totalRevenue = 0;

      let totalSpent = 0;

      projects
      .slice()
      .reverse()
      .forEach((project,index)=>{

        const realIndex =
          projects.length - 1 - index;

        const spent =
          project.expenses
          .reduce(
            (sum,item)=>
            sum + item.amount,
            0
          );

        const revenue =
          project.revenues
          .reduce(
            (sum,item)=>
            sum + item.amount,
            0
          );

        totalSpent += spent;

        totalRevenue += revenue;

        const profit =
          revenue - spent;

        const artistData =
          artists.find(
            a =>
            a.name ===
            project.artists[0]
          );

        const color =
          artistData
          ? artistData.color
          : "#a855f7";

        const expenseRows =
          project.expenses
          .map(exp=>`

            <tr>

              <td>
                ${exp.reason}
              </td>

              <td>
                ₹${exp.amount}
              </td>

            </tr>

          `)
          .join("");

        const revenueRows =
          project.revenues
          .map(rev=>`

            <tr>

              <td>
                ${rev.reason}
              </td>

              <td>
                ₹${rev.amount}
              </td>

            </tr>

          `)
          .join("");

        const card =
          document.createElement("div");

        card.className =
          "project-card";

        card.style.border =
          `1px solid ${color}`;

        card.innerHTML = `

          <h2 style="color:${color}">
            ${project.name}
          </h2>

          <p class="artist">

            Artists:
            ${project.artists.join(", ")}

          </p>

          <h3 style="margin-top:18px;color:#f472b6">
            Expense History
          </h3>

          <table class="mini-table">

            <thead>

              <tr>

                <th>
                  Reason
                </th>

                <th>
                  Amount
                </th>

              </tr>

            </thead>

            <tbody>

              ${expenseRows || `
                <tr>
                  <td colspan="2">
                    No Expenses Yet
                  </td>
                </tr>
              `}

            </tbody>

          </table>

          <h3 style="margin-top:22px;color:#22c55e">
            Revenue History
          </h3>

          <table class="mini-table">

            <thead>

              <tr>

                <th>
                  Reason
                </th>

                <th>
                  Amount
                </th>

              </tr>

            </thead>

            <tbody>

              ${revenueRows || `
                <tr>
                  <td colspan="2">
                    No Revenue Yet
                  </td>
                </tr>
              `}

            </tbody>

          </table>

          <div class="stats">

            <p>
              Budget:
              ₹${project.budget}
            </p>

            <p>
              Total Spent:
              ₹${spent}
            </p>

            <p>
              Total Revenue:
              ₹${revenue}
            </p>

            <p class="${
              profit >= 0
              ? 'profit'
              : 'loss'
            }">

              ${
                profit >= 0
                ? 'Profit'
                : 'Loss'
              }

              :
              ₹${profit}

            </p>

          </div>

          <input
            type="text"
            id="expenseReason-${realIndex}"
            placeholder="Expense Reason"
          >

          <input
            type="number"
            id="expenseAmount-${realIndex}"
            placeholder="Expense Amount"
          >

          <button
            class="pink-btn"
            onclick="addExpense(${realIndex})"
          >
            Add Expense
          </button>

          <input
            type="text"
            id="revenueReason-${realIndex}"
            placeholder="Revenue Reason"
          >

          <input
            type="number"
            id="revenueAmount-${realIndex}"
            placeholder="Revenue Amount"
          >

          <button
            class="primary-btn"
            onclick="addRevenue(${realIndex})"
          >
            Add Revenue
          </button>

        `;

        grid.appendChild(card);

      });

      document.getElementById(
        "totalProjects"
      ).innerText =
        projects.length;

      document.getElementById(
        "totalRevenue"
      ).innerText =
        "₹" + totalRevenue;

      document.getElementById(
        "totalSpent"
      ).innerText =
        "₹" + totalSpent;

      document.getElementById(
        "totalProfit"
      ).innerText =
        "₹" + (
          totalRevenue -
          totalSpent
        );

      chart.data.datasets[0].data = [

        totalSpent,

        totalRevenue

      ];

      chart.update();
    }

    loadArtists();

    renderLegend();

    renderProjects();

  </script>

</body>

</html>
