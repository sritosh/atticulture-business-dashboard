<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    ATTICULTURE Budget
  </title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial,sans-serif;

      background:
      linear-gradient(
        135deg,
        #09090f,
        #111827,
        #1e1b4b
      );

      min-height:100vh;

      padding:30px;

      color:white;

      overflow-x:hidden;

      position:relative;
    }

    /* BACKGROUND */

    .bg-animation{

      position:fixed;

      width:100%;

      height:100%;

      top:0;

      left:0;

      overflow:hidden;

      z-index:-1;
    }

    .blob{

      position:absolute;

      border-radius:50%;

      filter:blur(120px);

      opacity:0.35;

      animation:float 12s infinite ease-in-out;
    }

    .blob1{

      width:350px;

      height:350px;

      background:#7c3aed;

      top:10%;

      left:5%;
    }

    .blob2{

      width:300px;

      height:300px;

      background:#06b6d4;

      bottom:10%;

      right:10%;

      animation-delay:2s;
    }

    .blob3{

      width:250px;

      height:250px;

      background:#ec4899;

      top:40%;

      right:30%;

      animation-delay:4s;
    }

    @keyframes float{

      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-30px);
      }

      100%{
        transform:translateY(0px);
      }
    }

    /* NAVBAR */

    .navbar{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:35px;
    }

    .logo{

      font-size:38px;

      font-weight:bold;

      color:#a855f7;

      text-shadow:
      0 0 10px #9333ea,
      0 0 25px #9333ea;
    }

    .nav-links{

      display:flex;

      gap:15px;

      flex-wrap:wrap;
    }

    .nav-links a{

      text-decoration:none;

      padding:12px 20px;

      border-radius:14px;

      color:white;

      font-weight:bold;

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(12px);
    }

    /* CARDS */

    .top-cards{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(220px,1fr));

      gap:20px;

      margin-bottom:30px;
    }

    .card,
    .budget-box,
    .chart-box,
    table{

      background:
      rgba(255,255,255,0.08);

      border:
      1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(14px);

      border-radius:24px;

      box-shadow:
      0 8px 30px rgba(0,0,0,0.3);
    }

    .card{

      padding:25px;
    }

    .card p{

      color:#cbd5e1;
    }

    .card h2{

      margin-top:10px;

      font-size:30px;
    }

    /* FORM */

    .budget-box{

      padding:25px;

      margin-bottom:30px;
    }

    .budget-box h2{

      margin-bottom:20px;

      color:#c084fc;
    }

    input{

      width:100%;

      padding:14px;

      margin-top:12px;

      border:none;

      border-radius:14px;

      background:
      rgba(255,255,255,0.08);

      color:white;

      outline:none;
    }

    button{

      padding:14px;

      border:none;

      border-radius:14px;

      color:white;

      font-weight:bold;

      cursor:pointer;
    }

    .save-btn{

      width:100%;

      margin-top:15px;

      background:
      linear-gradient(
        to right,
        #7c3aed,
        #06b6d4
      );
    }

    .edit-btn{

      background:
      linear-gradient(
        to right,
        #3b82f6,
        #06b6d4
      );
    }

    .delete-btn{

      background:
      linear-gradient(
        to right,
        #ef4444,
        #f97316
      );
    }

    /* CHART */

    .chart-box{

      padding:25px;

      margin-bottom:30px;
    }

    /* TABLE */

    table{

      width:100%;

      border-collapse:collapse;

      overflow:hidden;
    }

    th{

      padding:18px;

      background:
      rgba(124,58,237,0.3);

      color:white;
    }

    td{

      padding:18px;

      text-align:center;

      border-bottom:
      1px solid rgba(255,255,255,0.08);
    }

    .action-buttons{

      display:flex;

      gap:10px;

      justify-content:center;
    }

    /* FOOTER */

    .footer{

      text-align:center;

      margin-top:40px;

      color:#cbd5e1;

      font-size:14px;
    }

    /* MOBILE */

    @media(max-width:768px){

      body{
        padding:18px;
      }

      .navbar{

        flex-direction:column;

        gap:20px;

        align-items:flex-start;
      }

      table{

        display:block;

        overflow-x:auto;

        white-space:nowrap;
      }

      .action-buttons{

        flex-direction:column;
      }
    }

  </style>

</head>

<body>

  <!-- BACKGROUND -->

  <div class="bg-animation">

    <div class="blob blob1"></div>

    <div class="blob blob2"></div>

    <div class="blob blob3"></div>

  </div>

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      ATTICULTURE
    </div>

    <div class="nav-links">

      <a href="index.html">
        Dashboard
      </a>

      <a href="projects.html">
        Projects
      </a>

      <a href="artists.html">
        Artists
      </a>

    
      <a href="events.html">
        Events
      </a>

    </div>

  </div>

  <!-- OVERVIEW -->

  <div class="top-cards">

    <div class="card">

      <p>Total Budget</p>

      <h2 id="totalBudget">
        ₹0
      </h2>

    </div>

    <div class="card">

      <p>Total Spent</p>

      <h2 id="totalSpent">
        ₹0
      </h2>

    </div>

    <div class="card">

      <p>Remaining</p>

      <h2 id="remainingBudget">
        ₹0
      </h2>

    </div>

  </div>

  <!-- FORM -->

  <div class="budget-box">

    <h2>
      Add Monthly Budget
    </h2>

    <input
      type="text"
      id="month"
      placeholder="Month"
    >

    <input
      type="number"
      id="budget"
      placeholder="Budget"
    >

    <input
      type="number"
      id="spent"
      placeholder="Spent"
    >

    <button
      class="save-btn"
      onclick="saveBudget()"
    >
      Save Budget
    </button>

  </div>

  <!-- CHART -->

  <div class="chart-box">

    <canvas id="budgetChart"></canvas>

  </div>

  <!-- TABLE -->

  <table>

    <thead>

      <tr>

        <th>Month</th>

        <th>Budget</th>

        <th>Spent</th>

        <th>Actions</th>

      </tr>

    </thead>

    <tbody id="budgetTable"></tbody>

  </table>

  <!-- FOOTER -->

  <div class="footer">

    Made with ❤️ by Sritosh for Atticulture

  </div>

  <script>

    const defaultArtists = [

      {
        name:"Ofro",
        color:"#a855f7"
      },

      {
        name:"Kelithee",
        color:"#06b6d4"
      },

      {
        name:"Asal kolaar",
        color:"#ec4899"
      },

      {
        name:"Fault kai",
        color:"#22c55e"
      },

      {
        name:"Urban thozha",
        color:"#f97316"
      },

      {
        name:"Vaasi",
        color:"#eab308"
      },

      {
        name:"Rahul Sridhar",
        color:"#3b82f6"
      }

    ];

    if(!localStorage.getItem("artists")){

      localStorage.setItem(
        "artists",
        JSON.stringify(defaultArtists)
      );
    }

    let budgets =
      JSON.parse(
        localStorage.getItem("budgets")
      ) || [];

    /* SAVE */

    function saveBudget(){

      const month =
        document.getElementById("month").value;

      const budget =
        Number(
          document.getElementById("budget").value
        );

      const spent =
        Number(
          document.getElementById("spent").value
        );

      if(
        !month ||
        !budget ||
        !spent
      ){

        alert("Fill all fields");

        return;
      }

      budgets.push({

        month,
        budget,
        spent

      });

      localStorage.setItem(
        "budgets",
        JSON.stringify(budgets)
      );

      renderBudget();

      document.getElementById("month").value = "";

      document.getElementById("budget").value = "";

      document.getElementById("spent").value = "";
    }

    /* EDIT */

    function editBudget(index){

      const updatedMonth =
        prompt(
          "Edit Month",
          budgets[index].month
        );

      const updatedBudget =
        prompt(
          "Edit Budget",
          budgets[index].budget
        );

      const updatedSpent =
        prompt(
          "Edit Spent",
          budgets[index].spent
        );

      if(
        updatedMonth &&
        updatedBudget &&
        updatedSpent
      ){

        budgets[index].month =
          updatedMonth;

        budgets[index].budget =
          Number(updatedBudget);

        budgets[index].spent =
          Number(updatedSpent);

        localStorage.setItem(
          "budgets",
          JSON.stringify(budgets)
        );

        renderBudget();
      }
    }

    /* DELETE */

    function deleteBudget(index){

      const confirmDelete =
        confirm(
          "Delete this month?"
        );

      if(confirmDelete){

        budgets.splice(index,1);

        localStorage.setItem(
          "budgets",
          JSON.stringify(budgets)
        );

        renderBudget();
      }
    }

    /* CHART */

    const ctx =
      document.getElementById(
        "budgetChart"
      );

    const chart =
      new Chart(ctx,{

        type:"bar",

        data:{

          labels:[],

          datasets:[

            {
              label:"Budget",
              data:[],
              backgroundColor:"#7c3aed"
            },

            {
              label:"Spent",
              data:[],
              backgroundColor:"#ef4444"
            }

          ]
        }

      });

    /* RENDER */

    function renderBudget(){

      const table =
        document.getElementById(
          "budgetTable"
        );

      table.innerHTML = "";

      let totalBudget = 0;

      let totalSpent = 0;

      chart.data.labels = [];

      chart.data.datasets[0].data = [];

      chart.data.datasets[1].data = [];

      budgets.forEach((item,index)=>{

        totalBudget += item.budget;

        totalSpent += item.spent;

        chart.data.labels.push(item.month);

        chart.data.datasets[0].data.push(item.budget);

        chart.data.datasets[1].data.push(item.spent);

        const row =
          document.createElement("tr");

        row.innerHTML = `

          <td>
            ${item.month}
          </td>

          <td>
            ₹${item.budget}
          </td>

          <td>
            ₹${item.spent}
          </td>

          <td>

            <div class="action-buttons">

              <button
                class="edit-btn"
                onclick="editBudget(${index})"
              >
                Edit
              </button>

              <button
                class="delete-btn"
                onclick="deleteBudget(${index})"
              >
                Delete
              </button>

            </div>

          </td>

        `;

        table.appendChild(row);

      });

      chart.update();

      document.getElementById(
        "totalBudget"
      ).innerText =
        "₹" + totalBudget;

      document.getElementById(
        "totalSpent"
      ).innerText =
        "₹" + totalSpent;

      document.getElementById(
        "remainingBudget"
      ).innerText =
        "₹" + (
          totalBudget -
          totalSpent
        );
    }

    renderBudget();

  </script>

</body>

</html>
